<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armo Tu Viaje Mágico</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* Chat widget */
    #chat-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f083a0, #f7b8c4);
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(240,131,160,0.5);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: transform 0.2s;
    }
    #chat-btn:hover { transform: scale(1.1); }

    #chat-window {
      position: fixed;
      bottom: 90px;
      right: 24px;
      width: 340px;
      height: 480px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      z-index: 9999;
      display: none;
      flex-direction: column;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
    }
    #chat-window.open { display: flex; }

    #chat-header {
      background: linear-gradient(135deg, #f083a0, #f7b8c4);
      padding: 16px 20px;
      color: white;
      font-weight: 800;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #chat-header span { font-size: 22px; }
    #chat-close {
      margin-left: auto;
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fdf6f8;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.6;
    }
    .msg.bot {
      background: #fff;
      border: 1px solid #f7b8c4;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg.user {
      background: linear-gradient(135deg, #f083a0, #f7b8c4);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.typing { color: #aaa; font-style: italic; }

    #chat-input-area {
      display: flex;
      padding: 12px;
      gap: 8px;
      border-top: 1px solid #f5e0e8;
      background: #fff;
    }
    #chat-input {
      flex: 1;
      border: 1.5px solid #f7b8c4;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    #chat-input:focus { border-color: #f083a0; }
    #chat-send {
      background: linear-gradient(135deg, #f083a0, #f7b8c4);
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      color: white;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    #chat-send:hover { transform: scale(1.1); }

    @media (max-width: 480px) {
      #chat-window {
        width: calc(100vw - 20px);
        right: 10px;
        bottom: 80px;
        height: 420px;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <iframe
    src="https://www.canva.com/design/DAHAG6UCzMY/Kr_aLS-YLtXilVwvTMDDtQ/view?embed"
    allowfullscreen="allowfullscreen"
    allow="fullscreen">
  </iframe>

  <!-- Chat Button -->
  <button id="chat-btn" onclick="toggleChat()">🏰</button>

  <!-- Chat Window -->
  <div id="chat-window">
    <div id="chat-header">
      <span>✨</span>
      <div>
        <div>Armo Tu Viaje Mágico</div>
        <div style="font-size:11px;font-weight:400;opacity:0.9;">Asistente virtual</div>
      </div>
      <button id="chat-close" onclick="toggleChat()">×</button>
    </div>
    <div id="chat-messages">
      <div class="msg bot">¡Hola! 👋 Soy la asistente virtual de Armo Tu Viaje Mágico. Preguntame lo que quieras sobre viajes a Disney y Universal 🏰✨</div>
    </div>
    <div id="chat-input-area">
      <input id="chat-input" type="text" placeholder="Escribí tu pregunta..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button id="chat-send" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const history = [];

    function toggleChat() {
      const win = document.getElementById('chat-window');
      win.classList.toggle('open');
      if (win.classList.contains('open')) {
        document.getElementById('chat-input').focus();
      }
    }

    function addMessage(text, role) {
      const messages = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      addMessage(text, 'user');
      history.push({ role: 'user', content: text });

      const typing = addMessage('Escribiendo...', 'bot typing');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history.slice(-10) })
        });
        const data = await res.json();
        typing.remove();
        const reply = data.reply || 'Lo siento, hubo un error. Escribile a Emili: +54 9 11 2688 6638';
        addMessage(reply, 'bot');
        history.push({ role: 'assistant', content: reply });
      } catch (e) {
        typing.remove();
        addMessage('Hubo un error. Escribile a Emili por WhatsApp: +54 9 11 2688 6638', 'bot');
      }
    }
  </script>

</body>
</html>
